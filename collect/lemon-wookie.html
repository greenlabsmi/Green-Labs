<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Card Unlocked! | Green Labs</title>
    <link rel="stylesheet" href="../style.css"> 
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; text-align: center; padding: 20px; }
        .unlock-container { max-width: 400px; margin: 40px auto; padding: 30px; border-radius: 24px; background: #111; border: 1px solid #222; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .card-img { width: 100%; border-radius: 12px; border: 2px solid #d6a441; box-shadow: 0 0 20px rgba(214, 164, 65, 0.3); margin-bottom: 20px; }
        .rarity { color: #d6a441; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; font-size: 12px; margin-bottom: 5px; }
        .strain-name { font-size: 32px; font-family: 'Cinzel', serif; margin: 0 0 10px 0; color: #fff; }
        .reward-box { background: rgba(7, 137, 95, 0.15); border: 1px dashed #07895f; padding: 15px; border-radius: 12px; margin: 20px 0; }
        .reward-text { color: #2ef8bb; font-weight: 700; margin: 0; font-size: 18px; }
        .btn-stack { display: flex; flex-direction: column; gap: 10px; }
        .fine-print { font-size: 10px; color: #666; margin-top: 30px; line-height: 1.4; }
        .status-badge { color: #d6a441; font-size: 14px; font-weight: 700; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

    <div class="unlock-container">
        <span id="status-msg" class="status-badge">✨ NEW CARD UNLOCKED!</span>
        <p class="rarity" id="rarity-label">PREMIUM HYBRID</p>
        <h1 class="strain-name" id="name-label">Lemon Wookie</h1>
        
        <img id="card-art" src="../assets/img/strains/lemon-wookie-art.jpg" alt="Card Art" class="card-img">

        <div class="reward-box">
            <p style="font-size: 12px; color: #aaa; margin-bottom: 5px;">COLLECTOR PERK:</p>
            <p class="reward-text" id="reward-label">$1 OFF YOUR EIGHTH</p>
        </div>

        <div class="btn-stack">
            <a href="../collection.html" class="btn btn--gold" style="width: 100%; text-decoration: none; display: block; padding: 15px; border-radius: 10px; background: #d6a441; color: #000; font-weight: 800;">View My Collection</a>
            <a href="https://greenlabsmi.com" class="btn btn--ghost" style="width: 100%; text-decoration: none; display: block; padding: 15px; color: #666; font-size: 14px;">Back to Website</a>
        </div>

        <p class="fine-print">
            Show this screen or your collection page at checkout. Rewards are manually applied by a budtender. 
            Browser-based collection may reset if browser data is cleared.
        </p>
    </div>

    <script src="../assets/js/card-collection.js"></script>
    
    <script>
        // --- 1. CONFIGURATION (Change this for each file) ---
        const CURRENT_CARD_ID = "lemon-wookie"; 

        window.onload = () => {
            // --- 2. THE FOOLPROOF SAVE ---
            // We save immediately to ensure the Binder (collection.html) sees the scan.
            let collected = JSON.parse(localStorage.getItem('collectedStrains')) || [];
            
            if (!collected.includes(CURRENT_CARD_ID)) {
                collected.push(CURRENT_CARD_ID);
                localStorage.setItem('collectedStrains', JSON.stringify(collected));
                console.log("✅ Card successfully added to Binder!");
            } else {
                document.getElementById('status-msg').innerText = "VIEWING OWNED CARD";
            }

            // --- 3. UI POPULATION ---
            // If getCardById exists in your card-collection.js, we use it for data.
            // If not, the HTML fallback above already shows the correct info.
            if (typeof getCardById === 'function') {
                const card = getCardById(CURRENT_CARD_ID);
                if (card) {
                    document.getElementById('name-label').innerText = card.name;
                    document.getElementById('rarity-label').innerText = `${card.rarity || 'PREMIUM'} • ${card.type || 'HYBRID'}`;
                    document.getElementById('reward-label').innerText = card.reward;
                    document.getElementById('card-art').src = "../" + card.image;
                }
            }
        };
    </script>
</body>
</html>
