<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Collection | Green Labs</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .binder-header { text-align: center; padding: 40px 0; }
        .binder-title { font-family: 'Cinzel', serif; font-size: 32px; color: #d6a441; margin-bottom: 10px; }
        
        /* Progress Bar */
        .progress-container { max-width: 300px; margin: 0 auto 40px; }
        .progress-bar-bg { background: #222; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 10px; }
        .progress-fill { background: #07895f; height: 100%; width: 0%; transition: width 0.5s ease; }
        
        /* Card Grid */
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 800px; margin: 0 auto; }
        @media (min-width: 600px) { .card-grid { grid-template-columns: 1fr 1fr 1fr; } }
        
        .card-slot { background: #111; border-radius: 12px; padding: 10px; border: 1px solid #222; position: relative; }
        .card-slot.collected { border-color: #d6a441; box-shadow: 0 0 15px rgba(214, 164, 65, 0.15); }
        .card-slot.locked { opacity: 0.5; }
        
        .card-thumb { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        .locked .card-thumb { filter: grayscale(1) brightness(0.4); }
        
        .card-info h3 { font-size: 14px; margin: 0; font-family: 'Cinzel', serif; }
        .card-status { font-size: 10px; font-weight: 800; text-transform: uppercase; margin-top: 5px; }
        .status-collected { color: #2ef8bb; }
        .status-locked { color: #666; }
        
        .perk-text { font-size: 11px; color: #aaa; margin-top: 8px; line-height: 1.3; min-height: 30px; }
        
        .btn-find { display: block; background: #222; color: white; text-decoration: none; font-size: 10px; padding: 8px; border-radius: 6px; margin-top: 10px; text-align: center; }

        .footer-tools { text-align: center; margin-top: 60px; padding-bottom: 40px; }
        .reset-link { color: #444; font-size: 12px; background: none; border: none; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="binder-header">
        <h1 class="binder-title">Strain Binder</h1>
        <div class="progress-container">
            <span id="progress-text">0 / 5 CARDS</span>
            <div class="progress-bar-bg">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>
    </div>

    <div class="card-grid" id="binder-grid">
        </div>

    <div class="footer-tools">
        <p style="font-size: 12px; color: #666; max-width: 400px; margin: 0 auto 20px;">
            Show this page to your budtender at checkout. Rewards are manually applied and may vary by availability.
        </p>
        <a href="https://greenlabsmi.com" class="btn btn--ghost">Back to Shop</a>
        <br><br>
        <button class="reset-link" onclick="resetCollection()">Reset Collection (Test Only)</button>
    </div>

    <script src="assets/js/card-collection.js"></script>
    <script>
        window.onload = () => {
            const collected = getCollectedCards();
            const grid = document.getElementById('binder-grid');
            
            // Update Progress
            const percent = (collected.length / GL_CARDS.length) * 100;
            document.getElementById('progress-fill').style.width = percent + "%";
            document.getElementById('progress-text').innerText = `${collected.length} / ${GL_CARDS.length} CARDS COLLECTED`;

            // Render Cards
            GL_CARDS.forEach(card => {
                const isOwned = collected.includes(card.id);
                const slot = document.createElement('div');
                slot.className = `card-slot ${isOwned ? 'collected' : 'locked'}`;
                
                slot.innerHTML = `
                    <img src="${card.image}" class="card-thumb">
                    <div class="card-info">
                        <h3>${card.name}</h3>
                        <div class="card-status ${isOwned ? 'status-collected' : 'status-locked'}">
                            ${isOwned ? '● Collected' : '○ Locked'}
                        </div>
                        <p class="perk-text">${isOwned ? card.reward : card.teaser}</p>
                        ${!isOwned ? `<a href="${card.collectUrl}" class="btn-find">Find Card</a>` : ''}
                    </div>
                `;
                grid.appendChild(slot);
            });
        };
    </script>
</body>
</html>
