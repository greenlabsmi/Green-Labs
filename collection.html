<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dutch Collection | Green Labs</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d6a441;
            --green: #2ef8bb;
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- Typography --- */
        h1, h2, h3, .set-title { font-family: 'Cinzel', serif; letter-spacing: 1px; }

        .binder-container { max-width: 900px; margin: 0 auto; padding: 20px; }

        .header { text-align: center; padding: 60px 0 20px; }
        .header h1 { font-size: 38px; color: var(--gold); margin: 0; }
        .header p { color: rgba(255,255,255,0.6); font-weight: 600; font-size: 14px; margin-top: 5px; }

        /* --- Progress Section --- */
        .master-progress {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 40px;
            text-align: center;
        }
        .progress-label { font-size: 12px; font-weight: 800; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; display: block; }
        .bar-bg { background: #111; height: 12px; border-radius: 6px; overflow: hidden; position: relative; }
        .bar-fill { background: linear-gradient(90deg, var(--gold), #ffcc66); height: 100%; transition: width 1s ease-out; }

        /* --- Set Section --- */
        .set-section { margin-bottom: 50px; }
        .set-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .set-info h2 { font-size: 20px; margin: 0; color: #fff; }
        .set-reward { font-size: 11px; font-weight: 800; color: var(--green); text-transform: uppercase; }
        
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

        /* --- Card Styles --- */
        .card-slot {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .card-slot.collected { border-color: rgba(214, 164, 65, 0.3); background: rgba(214, 164, 65, 0.05); }
        .card-slot.locked { filter: grayscale(1); opacity: 0.4; }
        .card-slot:active { transform: scale(0.95); }

        .card-thumb { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
        .card-name { font-size: 10px; font-weight: 700; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- Redemption Modal (The Big Reveal) --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 1000; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(15px); padding: 20px;
        }
        .modal-content {
            background: #111; border: 1px solid var(--gold); border-radius: 24px;
            width: 100%; max-width: 400px; padding: 30px; text-align: center;
            position: relative; animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .modal-art { width: 100%; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; }
        .modal-title { color: var(--gold); font-size: 28px; margin: 0; }
        .modal-perk { color: var(--green); font-weight: 800; font-size: 14px; margin: 10px 0 25px; }

        /* QR Section */
        .qr-area { background: white; padding: 15px; border-radius: 15px; display: inline-block; margin-bottom: 10px; }
        #qrcode img { width: 180px; height: 180px; }
        .qr-note { font-size: 11px; color: #666; margin-top: 10px; font-weight: 600; }

        .btn-close { position: absolute; top: 15px; right: 15px; font-size: 24px; color: #444; border: none; background: none; cursor: pointer; }

        /* --- Empty State / Hint --- */
        .hint-text { font-size: 9px; color: rgba(255,255,255,0.4); text-align: center; margin-top: 5px; font-style: italic; }

        /* --- Responsive --- */
        @media (min-width: 600px) { .card-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>

    <div class="binder-container">
        <header class="header">
            <h1>The Dutch Collection</h1>
            <p>Your Digital Strain Binder</p>
        </header>

        <div class="master-progress">
            <span class="progress-label" id="progress-text">0 / 22 Strains Collected</span>
            <div class="bar-bg">
                <div id="progress-fill" class="bar-fill" style="width: 0%;"></div>
            </div>
        </div>

        <div id="sets-container"></div>
    </div>

    <div id="redemption-modal" class="modal">
        <div class="modal-content">
            <button class="btn-close" onclick="closeModal()">×</button>
            <img src="" id="modal-art" class="modal-art">
            <h2 id="modal-title" class="modal-title">Lemon Wookie</h2>
            <p id="modal-perk" class="modal-perk">$1 OFF YOUR EIGHTH</p>
            
            <div class="qr-area">
                <div id="qrcode"></div>
                <p class="qr-note">BUDTENDER: SCAN TO POPULATE REASON</p>
            </div>
            
            <button class="btn-close" onclick="closeModal()" style="position:static; margin-top:20px; color:rgba(255,255,255,0.3); font-size:12px; text-decoration:underline;">Back to Binder</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="assets/js/card-collection.js"></script>

    <script>
        // --- DATA STRUCTURE (Groups the 22 Deli Strains into Sets) ---
        const GL_SETS = [
            {
                id: 'jedi-council',
                name: 'The Jedi Council',
                reward: 'Set Reward: 20% Off Star Wars Strains',
                cardIds: ['lemon-wookie', 'solo-walker', 'falcon-9']
            },
            {
                id: 'pastry-shop',
                name: 'The Pastry Shop',
                reward: 'Set Reward: Free 100mg Edible',
                cardIds: ['13-layer-cake', 'banana-split', 'double-bubble']
            },
            {
                id: 'secret-stash',
                name: 'The Secret Stash',
                reward: 'Set Reward: Gold Member Status',
                cardIds: ['security-guy', 'the-colossus', 'daily-prophet']
            },
            {
                id: 'indica-dungeon',
                name: 'The Dungeon',
                reward: 'Set Reward: $10 Credit',
                cardIds: ['garlic-breath', 'gorilla-88', 'spirit-hashplant', 'dead-prez']
            }
        ];

        // --- MOCK CARDS (Update with your actual img paths) ---
        const GL_CARDS = [
            { id: 'lemon-wookie', name: 'Lemon Wookie', image: 'assets/img/strains/lemon-wookie-art.jpg', reward: '$1 Off Lemon Wookie', hint: 'Find in the Deli' },
            { id: 'solo-walker', name: 'Solo Walker', image: 'assets/img/strains/solo-walker-art.jpg', reward: '$1 Off Solo Walker', hint: 'Find in the Deli' },
            { id: 'falcon-9', name: 'Falcon 9', image: 'assets/img/strains/falcon-9-art.jpg', reward: '$1 Off Falcon 9', hint: 'Find in the Deli' },
            { id: 'security-guy', name: 'The Security Guy', image: 'assets/img/hero.jpg', reward: 'Free Sticker Pack', hint: 'Reception Desk' },
            { id: 'the-colossus', name: 'The Colossus', image: 'assets/img/greenlabs-logo.png', reward: '15% Off One Item', hint: 'Near the 15ft Painting' },
            // ... Add the other 17 strains here following the same pattern
        ];

        let qr = null;

        window.onload = () => {
            renderBinder();
        };

        function renderBinder() {
            const collected = getCollectedCards(); // Function from your card-collection.js
            const container = document.getElementById('sets-container');
            container.innerHTML = '';

            // Update Master Progress
            const progress = (collected.length / 22) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('progress-text').innerText = `${collected.length} / 22 Strains Collected`;

            // Render Sets
            GL_SETS.forEach(set => {
                const section = document.createElement('div');
                section.className = 'set-section';
                
                const hasUnlockedAny = set.cardIds.some(id => collected.includes(id));
                const isComplete = set.cardIds.every(id => collected.includes(id));

                section.innerHTML = `
                    <div class="set-header">
                        <div class="set-info">
                            <h2 style="${!hasUnlockedAny ? 'color: #333;' : ''}">${set.name}</h2>
                            <span class="set-reward">${set.reward}</span>
                        </div>
                        <div style="font-size: 10px; font-weight: 800; color: ${isComplete ? 'var(--green)' : '#444'}">
                            ${set.cardIds.filter(id => collected.includes(id)).length}/${set.cardIds.length}
                        </div>
                    </div>
                    <div class="card-grid" id="grid-${set.id}"></div>
                `;

                container.appendChild(section);
                const grid = document.getElementById(`grid-${set.id}`);

                set.cardIds.forEach(cardId => {
                    const card = GL_CARDS.find(c => c.id === cardId) || { name: '???', image: '', hint: 'Keep looking...' };
                    const isOwned = collected.includes(cardId);

                    const slot = document.createElement('div');
                    slot.className = `card-slot ${isOwned ? 'collected' : 'locked'}`;
                    slot.onclick = () => isOwned ? openModal(card) : null;
                    
                    slot.innerHTML = `
                        <img src="${card.image}" class="card-thumb">
                        <div class="card-name">${card.name}</div>
                        ${!isOwned ? `<div class="hint-text">Hint: ${card.hint}</div>` : ''}
                    `;
                    grid.appendChild(slot);
                });
            });
        }

        function openModal(card) {
            document.getElementById('modal-title').innerText = card.name;
            document.getElementById('modal-perk').innerText = card.reward;
            document.getElementById('modal-art').src = card.image;
            
            // Clear old QR
            document.getElementById('qrcode').innerHTML = "";
            
            // Generate Text QR for the Budtender
            qr = new QRCode(document.getElementById("qrcode"), {
                text: `DANKAMON_REDEEM: ${card.reward} (${card.name})`,
                width: 180,
                height: 180,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            document.getElementById('redemption-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('redemption-modal').style.display = 'none';
        }

        // Fallback for missing collected logic
        function getCollectedCards() {
            try { return JSON.parse(localStorage.getItem('collectedStrains')) || []; }
            catch(e) { return []; }
        }
    </script>
</body>
</html>
