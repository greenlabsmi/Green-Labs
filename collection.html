<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dutch-A-Mon | Green Labs Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #d6a441; --green: #2ef8bb; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Cinzel', serif; letter-spacing: 1px; }

        .binder-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* Progress Module */
        .dex-stats { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: var(--glass); padding: 15px 25px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); }
        .dex-label { font-family: 'Cinzel', serif; color: var(--gold); font-size: 14px; font-weight: 900; }
        .dex-count { font-weight: 800; font-size: 18px; color: #fff; }

        /* Scroll Rows */
        .scroll-row { 
            display: flex; overflow-x: auto; gap: 15px; padding: 10px 5px 25px; 
            scroll-snap-type: x mandatory; scrollbar-width: none; 
        }
        .scroll-row::-webkit-scrollbar { display: none; }

        .section-header { padding-left: 5px; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .section-header h2 { font-size: 14px; color: var(--gold); text-transform: uppercase; margin: 0; }

        /* Card Styling */
        .card-wrapper { flex: 0 0 140px; scroll-snap-align: start; cursor: pointer; position: relative; }
        .card-frame { 
            width: 100%; aspect-ratio: 2/3; background: #111; border-radius: 12px; 
            overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative;
        }
        
        /* SUBTLE SHIMMER: Every 5 seconds */
        .collected .card-frame::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent);
            transform: skewX(-25deg); animation: subtleShimmer 6s infinite;
        }
        @keyframes subtleShimmer {
            0% { left: -150%; }
            15% { left: 150%; } /* The shimmer move */
            100% { left: 150%; } /* The rest period */
        }

        .card-img { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .card-name { font-size: 10px; font-weight: 700; margin-top: 8px; text-align: center; color: rgba(255,255,255,0.7); }
        .locked { filter: grayscale(1); opacity: 0.2; }

        /* Subtle Share Icon */
        .card-share-icon {
            position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.5);
            width: 24px; height: 24px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 10px; 
            color: var(--gold); border: 1px solid rgba(214,164,65,0.3); z-index: 5;
        }

        /* --- MODAL (Full Screen Card Viewer) --- */
        .modal { 
            position: fixed; inset: 0; background: var(--bg); z-index: 2000; 
            display: none; flex-direction: column; overflow-y: auto; 
        }
        .modal-header { 
            position: sticky; top: 0; background: rgba(5,5,5,0.9); 
            backdrop-filter: blur(10px); padding: 20px; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
        }
        .back-btn { background: none; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 8px 16px; border-radius: 30px; font-size: 12px; font-weight: 700; }
        
        .modal-body { padding: 20px; max-width: 500px; margin: 0 auto; text-align: center; width: 100%; }
        .modal-hero { width: 100%; max-height: 65vh; object-fit: contain; border-radius: 15px; margin-bottom: 20px; }

        .action-bar { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .action-btn { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; padding: 12px 20px; border-radius: 12px; font-size: 13px; 
            font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 8px;
        }
        .action-btn i { color: var(--gold); }

        .qr-area { background: #fff; padding: 15px; border-radius: 15px; display: inline-block; margin-bottom: 20px; }

        /* Footer */
        .collection-footer { background: #0a0a0a; border-top: 1px solid rgba(255,255,255,0.1); padding: 40px 20px; text-align: center; }
        .btn-shop { background: var(--gold); color: #000; padding: 16px 40px; border-radius: 12px; text-decoration: none; font-weight: 800; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="binder-container">
        <header style="text-align: center; padding: 30px 0;">
            <h1 style="color: var(--gold); margin:0; font-size: 28px;">DUTCH-A-MON</h1>
            <p style="font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px;">The Dutch Touch Collection</p>
        </header>

        <div class="dex-stats">
            <span class="dex-label">DUTCH-A-DEX</span>
            <span class="dex-count" id="master-count">0 / 22</span>
        </div>

        <div class="section-header"><h2>Your Collection</h2></div>
        <div id="all-collected-row" class="scroll-row"></div>

        <div id="sets-container" style="margin-top: 30px;"></div>
    </div>

    <footer class="collection-footer">
        <a href="https://greenlabsmi.com" class="btn-shop">Return to Shop</a>
        <p style="font-size: 10px; color: rgba(255,255,255,0.3);">© 2026 GREEN LABS PROVISIONS</p>
    </footer>

    <div id="viewer-modal" class="modal">
        <div class="modal-header">
            <button class="back-btn" onclick="closeModal()">← Back</button>
            <button class="back-btn" onclick="shareCurrentCard()" style="border-color: var(--gold); color: var(--gold);"><i class="fas fa-share-nodes"></i> Share</button>
        </div>
        <div class="modal-body">
            <img src="" id="modal-art" class="modal-hero">
            
            <div class="action-bar">
                <a href="" id="download-link" download class="action-btn"><i class="fas fa-download"></i> Save to Phone</a>
            </div>

            <div style="background: rgba(46, 248, 187, 0.05); border: 1px solid var(--green); padding: 15px; border-radius: 12px; margin-bottom: 20px;">
                <p id="modal-perk" style="color: var(--green); font-weight: 800; font-size: 16px; margin: 0;"></p>
            </div>

            <div class="qr-area"><div id="qrcode"></div></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const GL_CARDS = [
            { id: 'lemon-wookie', name: 'Lemon Wookie', image: 'assets/img/strains/lemon-wookie-art.jpg', reward: '$1 Off 1/8th', rarity: 'AWARD WINNER' },
            { id: 'falcon-9', name: 'Falcon 9', image: 'assets/img/strains/falcon-9-art.jpg', reward: '$1 Off 1/8th', rarity: 'PREMIUM' },
            { id: 'solo-walker', name: 'Solo Walker', image: 'assets/img/strains/solo-walker-art.jpg', reward: '$1 Off 1/8th', rarity: 'ELITE' },
            { id: '13-layer-cake', name: '13 Layer Cake', image: 'assets/img/strains/13-layer-cake-art.jpg', reward: '$1 Off 1/8th', rarity: 'SATIVA' },
            { id: 'banana-split', name: 'Banana Split', image: 'assets/img/strains/banana-split-art.jpg', reward: '$1 Off 1/8th', rarity: 'HYBRID' },
            { id: 'double-bubble', name: 'Double Bubble', image: 'assets/img/strains/double-bubble-art.jpg', reward: '$1 Off 1/8th', rarity: 'HYBRID' },
            { id: 'security-guy', name: 'The Bodyguard', image: 'assets/img/hero.jpg', reward: 'Free Sticker', rarity: 'SECRET' },
            { id: 'colossus', name: 'The Colossus', image: 'assets/img/greenlabs-logo.png', reward: '15% Off Total', rarity: 'LEGENDARY' }
        ];

        const GL_SETS = [
            { id: 'jedi', name: 'Jedi Council', reward: '20% Off Set', cardIds: ['lemon-wookie', 'falcon-9', 'solo-walker'] },
            { id: 'bakery', name: 'The Bakery', reward: 'Free Edible', cardIds: ['13-layer-cake', 'banana-split', 'double-bubble'] }
        ];

        let currentActiveId = null;

        function getCollected() { return JSON.parse(localStorage.getItem('collectedStrains')) || []; }

        function render() {
            const collected = getCollected();
            document.getElementById('master-count').innerText = `${collected.length} / 22`;

            const topRow = document.getElementById('all-collected-row');
            topRow.innerHTML = '';
            
            [...collected].reverse().forEach(id => {
                const card = GL_CARDS.find(c => c.id === id);
                if (card) {
                    topRow.insertAdjacentHTML('beforeend', `
                        <div class="card-wrapper collected" onclick="openModal('${id}')">
                            <div class="card-share-icon"><i class="fas fa-share-nodes"></i></div>
                            <div class="card-frame"><img src="${card.image}" class="card-img"></div>
                            <div class="card-name">${card.name}</div>
                        </div>`);
                }
            });

            const setContainer = document.getElementById('sets-container');
            setContainer.innerHTML = '';
            GL_SETS.forEach(set => {
                const count = set.cardIds.filter(id => collected.includes(id)).length;
                setContainer.insertAdjacentHTML('beforeend', `
                    <div class="set-section">
                        <div class="section-header"><h2>${set.name} <span style="color:rgba(255,255,255,0.2); font-size:10px;">• ${count}/${set.cardIds.length}</span></h2></div>
                        <div class="scroll-row" id="grid-${set.id}"></div>
                    </div>`);
                
                const grid = document.getElementById(`grid-${set.id}`);
                set.cardIds.forEach(id => {
                    const card = GL_CARDS.find(c => c.id === id) || { name: '???', image: '' };
                    const isOwned = collected.includes(id);
                    grid.insertAdjacentHTML('beforeend', `
                        <div class="card-wrapper ${isOwned ? 'collected' : 'locked'}" onclick="${isOwned ? `openModal('${id}')` : ''}">
                            ${isOwned ? `<div class="card-share-icon"><i class="fas fa-share-nodes"></i></div>` : ''}
                            <div class="card-frame"><img src="${card.image}" class="card-img"></div>
                            <div class="card-name">${card.name}</div>
                        </div>`);
                });
            });
        }

        function openModal(id) {
            currentActiveId = id;
            const card = GL_CARDS.find(c => c.id === id);
            document.getElementById('modal-art').src = card.image;
            document.getElementById('download-link').href = card.image;
            document.getElementById('modal-perk').innerText = "DISCOUNT: " + card.reward;
            
            document.getElementById('qrcode').innerHTML = '';
            new QRCode(document.getElementById("qrcode"), { text: `DUTCHAMON: ${id}`, width: 150, height: 150 });
            
            document.getElementById('viewer-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('viewer-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function shareCurrentCard() {
            const card = GL_CARDS.find(c => c.id === currentActiveId);
            const url = `https://greenlabsmi.com/collect/${currentActiveId}.html`;
            if (navigator.share) {
                navigator.share({ title: 'Dutch-A-Mon Unlocked!', text: `I just found the ${card.name}! Start your collection:`, url: url });
            }
        }

        window.onload = render;
    </script>
</body>
</html>
