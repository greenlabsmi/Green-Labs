<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dutch-A-Dex | Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d6a441; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); text-align: center; }
        .set-container { margin-bottom: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .set-title { font-family: 'Cinzel', serif; font-size: 20px; margin-bottom: 10px; }
        .set-reward-banner { background: rgba(46, 248, 187, 0.1); color: #2ef8bb; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: 800; margin-bottom: 15px; display: none; text-align: center; border: 1px solid #2ef8bb; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        .card { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.3s; }
        .card.locked { filter: grayscale(1) opacity(0.3); }
        .card img { width: 100%; display: block; }
        .completion-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .modal-content { background: #111; padding: 30px; border-radius: 20px; text-align: center; border: 2px solid var(--gold); max-width: 400px; }
    </style>
</head>
<body>

    <h1>DUTCH-A-DEX</h1>
    <div id="binder"></div>

    <div class="completion-modal" id="comp-modal">
        <div class="modal-content">
            <h2 style="font-family: 'Cinzel'; color: var(--gold);">SET COMPLETE!</h2>
            <p id="comp-msg"></p>
            <p style="font-size: 12px; color: #aaa;">Screenshot this and tag @DutchTouchGenetics on IG for a bonus goodie!</p>
            <button onclick="document.getElementById('comp-modal').style.display='none'" style="background: var(--gold); border: none; padding: 10px 20px; border-radius: 8px; font-weight: 800; margin-top: 20px;">Back to Binder</button>
        </div>
    </div>

    <script src="assets/js/dutchamon-db.js?v=1.1"></script>
    <script>
        const collected = JSON.parse(localStorage.getItem('collectedStrains')) || [];
        const binder = document.getElementById('binder');

        GL_SETS.forEach(set => {
            const setDiv = document.createElement('div');
            setDiv.className = 'set-container';
            
            const isComplete = set.cardIds.every(id => collected.includes(id));
            
            setDiv.innerHTML = `
                <div class="set-title">${set.name}</div>
                <div class="set-reward-banner" id="banner-${set.id}" style="display: ${isComplete ? 'block' : 'none'}">
                    🏆 SET COMPLETE: Redeem for ${set.reward}!
                </div>
                <div class="card-grid" id="grid-${set.id}"></div>
            `;
            binder.appendChild(setDiv);

            const grid = document.getElementById(`grid-${set.id}`);
            set.cardIds.forEach(cardId => {
                const cardData = GL_CARDS.find(c => c.id === cardId);
                const isCollected = collected.includes(cardId);
                const cardEl = document.createElement('div');
                cardEl.className = `card ${isCollected ? '' : 'locked'}`;
                cardEl.innerHTML = `<img src="${cardData.image}">`;
                grid.appendChild(cardEl);
            });

            if (isComplete && !localStorage.getItem(`notified-${set.id}`)) {
                showCompletion(set);
                localStorage.setItem(`notified-${set.id}`, 'true');
            }
        });

        function showCompletion(set) {
            document.getElementById('comp-modal').style.display = 'flex';
            document.getElementById('comp-msg').innerText = `You finished the ${set.name} collection! Show this to your budtender to claim your ${set.reward}.`;
        }
    </script>
</body>
</html>
