<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dutch-A-Dex | Collection</title>
    <meta property="og:title" content="My Dutch-A-Dex Collection">
    <meta property="og:description" content="Check out the rare strains I've found at Green Labs! Can you collect them all?">
    <meta property="og:image" content="https://greenlabsmi.com/assets/img/dutchamon-share.jpg">
    <meta property="og:url" content="https://greenlabsmi.com/collection.html">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d6a441; --bg: #050505; --mint: #2ef8bb; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; -webkit-tap-highlight-color: transparent; }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); text-align: center; font-size: 36px; margin-bottom: 5px; text-shadow: 0 4px 15px rgba(214, 164, 65, 0.2); }
        .subtitle { text-align: center; color: #aaa; font-size: 14px; margin-bottom: 30px; }
        
        /* Carousel Styles */
        .carousel-title { font-family: 'Cinzel', serif; font-size: 18px; color: #fff; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .carousel-container { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 20px; margin-bottom: 30px; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .carousel-container::-webkit-scrollbar { display: none; }
        .carousel-container .card { flex: 0 0 140px; scroll-snap-align: start; cursor: pointer; }

        /* Set Styles */
        .set-container { margin-bottom: 50px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .set-header { text-align: center; margin-bottom: 20px; }
        .set-title { font-family: 'Cinzel', serif; font-size: 26px; color: var(--gold); text-transform: uppercase; margin: 0; letter-spacing: 2px; }
        .set-tagline { font-size: 13px; color: #888; margin-top: 5px; font-weight: 600; }
        
        .set-reward-banner { background: rgba(46, 248, 187, 0.1); color: var(--mint); padding: 12px; border-radius: 8px; font-size: 12px; font-weight: 800; margin-bottom: 20px; display: none; text-align: center; border: 1px solid var(--mint); text-transform: uppercase; letter-spacing: 1px; cursor: pointer; animation: glow 2s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px rgba(46, 248, 187, 0.2); } to { box-shadow: 0 0 15px rgba(46, 248, 187, 0.5); } }
        
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        .card { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.2s; cursor: pointer; }
        .card.locked { filter: grayscale(1) brightness(0.2); }
        .card img { width: 100%; display: block; object-fit: contain; pointer-events: none; } /* Prevents drag-save on grid */

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; flex-direction: column; }
        .modal-content { background: #111; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid var(--gold); max-width: 350px; width: 100%; position: relative; }
        
        /* Modal Art */
        .modal-img-container { position: relative; margin-bottom: 15px; }
        .modal-img { width: 100%; border-radius: 12px; display: block; -webkit-touch-callout: default; } /* Enables Long Press Save */
        .modal-qr { position: absolute; inset: 0; background: white; border-radius: 12px; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-qr img { width: 100%; max-width: 200px; }
        .save-tip { background: var(--gold); color: black; font-size: 11px; font-weight: 800; padding: 6px; border-radius: 4px; margin-top: -10px; margin-bottom: 15px; display: none; }

        .modal-name { font-family: 'Cinzel', serif; font-size: 22px; color: #fff; margin: 0 0 5px 0; }
        .modal-reward { font-size: 13px; color: var(--mint); font-weight: 800; margin-bottom: 15px; }
        
        .btn { background: var(--gold); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 800; width: 100%; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 13px; margin-bottom: 8px; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: #fff; }
        .btn-redeem { background: var(--mint); color: #000; }

        /* Fullscreen Gallery */
        .fs-modal { position: fixed; inset: 0; background: #000; z-index: 200; display: none; flex-direction: column; }
        .fs-close { position: absolute; top: 20px; right: 20px; color: white; background: rgba(255,255,255,0.1); border: none; width: 40px; height: 40px; border-radius: 50%; z-index: 210; font-size: 20px; }
        .fs-gallery { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; width: 100%; height: 100%; align-items: center; scrollbar-width: none; }
        .fs-gallery::-webkit-scrollbar { display: none; }
        .fs-item { flex: 0 0 100%; scroll-snap-align: center; display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .fs-item img { max-width: 100%; max-height: 80vh; border-radius: 10px; }
    </style>
</head>
<body>

    <h1>DUTCH-A-DEX</h1>
    <p class="subtitle" id="collection-counter">0 / 0 Cards Found</p>

    <div class="carousel-title">MY COLLECTION</div>
    <div class="carousel-container" id="my-carousel"></div>

    <div id="binder"></div>

    <div class="modal" id="card-modal">
        <div class="modal-content">
            <div class="modal-img-container">
                <img id="modal-img" src="" class="modal-img">
                <div class="modal-qr" id="modal-qr"><img id="qr-img" src=""></div>
            </div>
            
            <div id="save-instruction" class="save-tip">👆 LONG-PRESS IMAGE TO SAVE TO PHOTOS</div>
            
            <h2 id="modal-name" class="modal-name">Strain Name</h2>
            <p id="modal-reward" class="modal-reward"></p>
            
            <button class="btn btn-redeem" id="toggle-qr-btn" onclick="toggleQR()">📱 Redeem (Budtender Scan)</button>
            <button class="btn btn-outline" id="save-btn" onclick="showSaveTip()">Save to Photo Album</button>
            <button class="btn" id="modal-share-btn">Share Link</button>
            <button class="btn btn-outline" style="border:none; color:#666;" onclick="closeModal()">Close</button>
        </div>
    </div>

    <div class="modal" id="comp-modal">
        <div class="modal-content">
            <h2 style="font-family: 'Cinzel'; color: var(--gold); margin-bottom: 10px;">SET MASTERY!</h2>
            <img id="comp-img" src="" class="modal-img" style="border: 2px solid var(--gold);">
            
            <div class="save-tip" style="display:block; background: var(--mint);">📸 SAVING INSTRUCTIONS:</div>
            <p style="font-size: 13px; color: #fff; line-height: 1.4; margin: 10px 0;">
                1. <b>Long-press</b> the image to "Save to Photos".<br>
                2. Post to your <b>Instagram Story</b>.<br>
                3. Tag <b>@DutchTouchGenetics</b>.<br>
                4. Show story to budtender for your reward!
            </p>
            
            <button class="btn" onclick="document.getElementById('comp-modal').style.display='none'">Back to Binder</button>
        </div>
    </div>

    <div class="fs-modal" id="fs-modal">
        <button class="fs-close" onclick="document.getElementById('fs-modal').style.display='none'">✕</button>
        <div class="fs-gallery" id="fs-gallery"></div>
    </div>

    <script src="assets/js/dutchamon-db.js?v=1.4"></script>
    <script>
        const collected = JSON.parse(localStorage.getItem('collectedStrains')) || [];
        const binder = document.getElementById('binder');
        const carousel = document.getElementById('my-carousel');
        let qrShowing = false;
        
        document.getElementById('collection-counter').innerText = `${collected.length} / ${GL_CARDS.length} Cards Found`;

        // Load Carousel
        if (collected.length === 0) {
            carousel.innerHTML = `<div style="font-size:12px; color:#555; padding: 20px;">Scan in-store to start your Dex...</div>`;
        } else {
            collected.forEach(id => {
                const data = GL_CARDS.find(c => c.id === id);
                if (data) {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `<img src="${data.image}">`;
                    div.onclick = () => openCardModal(data, true);
                    carousel.appendChild(div);
                }
            });
        }

        // Load Binder Sets
        GL_SETS.forEach(set => {
            const setDiv = document.createElement('div');
            setDiv.className = 'set-container';
            const isComplete = set.cardIds.every(id => collected.includes(id));
            
            setDiv.innerHTML = `
                <div class="set-header">
                    <h2 class="set-title">${set.name}</h2>
                    <div class="set-tagline">${set.tagline}</div>
                </div>
                <div class="set-reward-banner" id="banner-${set.id}" 
                     style="display: ${isComplete ? 'block' : 'none'}" 
                     onclick='showAchievement("${set.id}")'>
                    🏆 CLAIM ${set.reward} (CLICK HERE)
                </div>
                <div class="card-grid" id="grid-${set.id}"></div>
            `;
            binder.appendChild(setDiv);

            const grid = document.getElementById(`grid-${set.id}`);
            set.cardIds.forEach(cardId => {
                const card = GL_CARDS.find(c => c.id === cardId);
                const isCollected = collected.includes(cardId);
                const el = document.createElement('div');
                el.className = `card ${isCollected ? '' : 'locked'}`;
                el.innerHTML = `<img src="${card.image}">`;
                el.onclick = () => openCardModal(card, isCollected);
                grid.appendChild(el);
            });
        });

        function openCardModal(card, isUnlocked) {
            qrShowing = false;
            document.getElementById('save-instruction').style.display = 'none';
            document.getElementById('modal-img').style.display = 'block';
            document.getElementById('modal-qr').style.display = 'none';
            
            if (isUnlocked) {
                document.getElementById('modal-img').src = card.image;
                document.getElementById('modal-img').style.filter = "none";
                document.getElementById('modal-name').innerText = card.name;
                document.getElementById('modal-reward').innerText = `PERK: ${card.reward}`;
                document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(card.reward)}`;
                
                document.getElementById('toggle-qr-btn').style.display = "block";
                document.getElementById('save-btn').style.display = "block";
                document.getElementById('modal-share-btn').onclick = () => {
                    navigator.share({ title: 'Dutchamon!', text: `I found ${card.name}!`, url: `https://greenlabsmi.com/unlock.html?id=${card.id}` });
                };
            } else {
                document.getElementById('modal-img').src = card.image;
                document.getElementById('modal-img').style.filter = "grayscale(1) brightness(0.2)";
                document.getElementById('modal-name').innerText = "???";
                document.getElementById('modal-reward').innerText = "Keep scanning to unlock!";
                document.getElementById('toggle-qr-btn').style.display = "none";
                document.getElementById('save-btn').style.display = "none";
            }
            document.getElementById('card-modal').style.display = 'flex';
        }

        function showSaveTip() {
            document.getElementById('save-instruction').style.display = 'block';
            document.getElementById('save-btn').innerText = "Tap & Hold Image Above";
        }

        function toggleQR() {
            qrShowing = !qrShowing;
            document.getElementById('modal-img').style.display = qrShowing ? 'none' : 'block';
            document.getElementById('modal-qr').style.display = qrShowing ? 'flex' : 'none';
            document.getElementById('save-instruction').style.display = 'none';
            document.getElementById('toggle-qr-btn').innerText = qrShowing ? "Flip to Card" : "📱 Redeem (Budtender Scan)";
        }

        function showAchievement(setId) {
            const set = GL_SETS.find(s => s.id === setId);
            const primaryCard = GL_CARDS.find(c => c.id === set.cardIds[0]);
            document.getElementById('comp-img').src = primaryCard.image; // Placeholder for Set Badge
            document.getElementById('comp-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('card-modal').style.display = 'none'; }
    </script>
</body>
</html>
