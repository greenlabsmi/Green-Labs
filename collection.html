<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dutch-A-Mon | Green Labs Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #d6a441; --green: #2ef8bb; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Cinzel', serif; letter-spacing: 1px; }

        .binder-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* Dutch-A-Dex Progress */
        .dex-stats { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: var(--glass); padding: 15px 25px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); }
        .dex-label { font-family: 'Cinzel', serif; color: var(--gold); font-size: 14px; font-weight: 900; }
        .dex-count { font-weight: 800; font-size: 18px; color: #fff; }

        /* Scrollable Row General Styling */
        .scroll-row { 
            display: flex; 
            overflow-x: auto; 
            gap: 15px; 
            padding: 10px 5px 25px; 
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Hide scrollbar for clean look */
        }
        .scroll-row::-webkit-scrollbar { display: none; }

        /* --- Zone 1: All Collected Cards (Top Row) --- */
        .collected-header { padding-left: 5px; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .collected-header h2 { font-size: 14px; color: var(--gold); text-transform: uppercase; }

        /* --- Set Section Formatting --- */
        .set-section { margin-bottom: 40px; }
        .set-header { padding: 0 5px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-end; }
        .set-name { font-size: 18px; margin: 0; }
        .set-reward-tag { font-size: 10px; font-weight: 800; color: var(--green); text-transform: uppercase; }

        /* Dutch-A-Mon Card Styling */
        .card-wrapper { flex: 0 0 140px; scroll-snap-align: start; cursor: pointer; transition: 0.3s; position: relative; }
        .card-frame { 
            width: 100%; aspect-ratio: 2/3; background: #111; border-radius: 12px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1); position: relative;
        }
        
        /* NEW: Share Button Styling */
        .share-btn {
            position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7); 
            border-radius: 50%; color: var(--gold); padding: 6px; 
            border: 1px solid var(--gold); font-size: 10px; cursor: pointer; opacity: 0; transition: opacity 0.3s;
        }
        .card-wrapper.collected:hover .share-btn { opacity: 1; } /* Show on hover for collected cards */

        /* Holographic Shimmer Effect */
        .collected .card-frame::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(125deg, transparent 0%, rgba(255,255,255,0.1) 45%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.1) 55%, transparent 100%);
            background-size: 200% 200%; animation: shimmer 3s infinite;
        }
        @keyframes shimmer { 0% { background-position: -200% -200%; } 100% { background-position: 200% 200%; } }

        .card-img-fix { width: 100%; height: 100%; object-fit: contain; }
        .card-name { font-size: 11px; font-weight: 700; margin-top: 8px; text-align: center; }
        .locked { filter: grayscale(1); opacity: 0.25; }

        /* Floating Scan Button */
        .scan-fab {
            position: fixed; bottom: 30px; right: 30px; background: var(--gold); width: 60px; height: 60px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); border: none; cursor: pointer; z-index: 1000; animation: fab-pulse 2s infinite;
        }
        @keyframes fab-pulse { 0% { transform: scale(1); box-shadow: 0 10px 20px rgba(0,0,0,0.5); } 50% { transform: scale(1.05); box-shadow: 0 15px 25px rgba(214,164,65,0.4); } 100% { transform: scale(1); box-shadow: 0 10px 20px rgba(0,0,0,0.5); } }

        /* Modal Layout */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; overflow-y: auto; }
        .modal-header { position: sticky; top: 0; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); padding: 20px; z-index: 10; display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .back-btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 16px; border-radius: 30px; font-size: 12px; font-weight: 700; cursor: pointer; }
        .modal-body { padding: 20px; max-width: 500px; margin: 0 auto; text-align: center; }
        .modal-hero { width: 100%; max-height: 55vh; object-fit: contain; border-radius: 15px; margin-bottom: 20px; }
        .reward-pill { background: rgba(46, 248, 187, 0.05); border: 1px solid var(--green); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .qr-section { background: #fff; padding: 20px; border-radius: 20px; display: inline-block; margin-bottom: 20px; }
        #qrcode img { margin: 0 auto; }

        /* Footer Section */
        .collection-footer { background: #0a0a0a; border-top: 1px solid rgba(255,255,255,0.1); padding: 60px 20px; text-align: center; margin-top: 40px; }
        .footer-logo { width: 60px; margin-bottom: 20px; opacity: 0.8; }
        .footer-btns { display: flex; flex-direction: column; gap: 15px; max-width: 300px; margin: 0 auto 30px; }
        .btn-footer { text-decoration: none; padding: 16px; border-radius: 12px; font-weight: 700; font-size: 14px; transition: 0.3s; }
        .btn-footer--main { background: var(--gold); color: #000; }
        .btn-footer--share { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .social-link { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <button class="scan-fab" onclick="alert('Open your camera to scan a Dutch-A-Mon QR code in-store!')">
        <i class="fas fa-qrcode fa-2x"></i>
    
    </button>

    <div class="binder-container">
        <header style="text-align: center; padding: 40px 0;">
            <h1 style="color: var(--gold); margin:0; font-size: 32px;">DUTCH-A-MON</h1>
            <p style="font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px;">The Dutch Touch Collection</p>
        </header>

        <div class="dex-stats">
            <span class="dex-label">DUTCH-A-DEX</span>
            <span class="dex-count" id="master-count">0 / 22</span>
        </div>

        <div class="collected-header">
            <h2>Your Collection</h2>
        </div>
        <div id="all-collected-row" class="scroll-row">
            </div>

        <div id="sets-container" style="margin-top: 40px;">
            </div>
    </div>

    <footer class="collection-footer">
        <img src="Dutch_Touch_Lion_Logo.png" class="footer-logo">
        <div class="footer-btns">
            <a href="https://greenlabsmi.com" class="btn-footer btn-footer--main">Return to Shop</a>
            <button onclick="shareEntireCollection()" class="btn-footer btn-footer--share">Share My Dutch-A-Dex</button>
        </div>
        <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 30px;">
            <a href="https://www.instagram.com/greenlabsmi" target="_blank" class="social-link">Instagram</a>
            <a href="https://www.facebook.com/GreenLabsMI/" target="_blank" class="social-link">Facebook</a>
        </div>
        <p style="font-size: 10px; color: rgba(255,255,255,0.3);">© 2026 GREEN LABS PROVISIONS • KEEP IT DUTCH</p>
    </footer>

    <div id="redemption-modal" class="modal">
        <div class="modal-header"><button class="back-btn" onclick="closeModal()">← Back to Binder</button></div>
        <div class="modal-body">
            <img src="" id="modal-art" class="modal-hero">
            <p id="modal-rarity" style="color: var(--gold); font-weight: 800; font-size: 11px; letter-spacing: 2px; margin-bottom: 5px;"></p>
            <h2 id="modal-title" style="font-size: 28px; margin: 0;"></h2>
            <div class="reward-pill">
                <span style="font-size: 9px; color: rgba(255,255,255,0.5); display: block; margin-bottom: 3px;">COLLECTOR DISCOUNT:</span>
                <p id="modal-perk" style="color: var(--green); font-weight: 800; font-size: 18px; margin: 0;"></p>
            </div>
            <div class="qr-section"><div id="qrcode"></div></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const GL_CARDS = [
            { id: 'lemon-wookie', name: 'Lemon Wookie', image: 'assets/img/strains/lemon-wookie-art.jpg', reward: '$1 Off Your 1/8th', rarity: 'AWARD WINNER' },
            { id: 'falcon-9', name: 'Falcon 9', image: 'assets/img/strains/falcon-9-art.jpg', reward: '$1 Off Your 1/8th', rarity: 'PREMIUM HYBRID' },
            { id: 'solo-walker', name: 'Solo Walker', image: 'assets/img/strains/solo-walker-art.jpg', reward: '$1 Off Your 1/8th', rarity: 'ELITE GENETICS' },
            { id: '13-layer-cake', name: '13 Layer Cake', image: 'assets/img/strains/13-layer-cake-art.jpg', reward: '$1 Off Your 1/8th', rarity: 'SATIVA HYBRID' },
            { id: 'banana-split', name: 'Banana Split', image: 'assets/img/strains/banana-split-art.jpg', reward: '$1 Off Your 1/8th', rarity: 'HYBRID' },
            { id: 'double-bubble', name: 'Double Bubble', image: 'assets/img/strains/double-bubble-art.jpg', reward: '$1 Off Your 1/8th', rarity: 'HYBRID' },
            { id: 'security-guy', name: 'The Bodyguard', image: 'assets/img/hero.jpg', reward: 'Free Sticker Pack', rarity: 'SECRET DROP' },
            { id: 'colossus', name: 'The Colossus', image: 'assets/img/greenlabs-logo.png', reward: '15% Off Total Order', rarity: 'LEGENDARY' }
        ];

        const GL_SETS = [
            { id: 'jedi', name: 'Jedi Council', reward: 'Reward: 20% Off Set', cardIds: ['lemon-wookie', 'falcon-9', 'solo-walker'] },
            { id: 'bakery', name: 'The Bakery', reward: 'Reward: Free Edible', cardIds: ['13-layer-cake', 'banana-split', 'double-bubble'] },
            { id: 'hidden', name: 'Secret Stash', reward: 'Reward: Mystery Merch', cardIds: ['security-guy', 'colossus'] }
        ];

        function getCollected() { return JSON.parse(localStorage.getItem('collectedStrains')) || []; }

        function render() {
            const collected = getCollected();
            const totalCount = 22; 
            document.getElementById('master-count').innerText = `${collected.length} / ${totalCount}`;

            // 1. Populate Top Row (Everything Collected, newest first to emphasize recent gains)
            const topRow = document.getElementById('all-collected-row');
            topRow.innerHTML = '';
            if (collected.length === 0) {
                topRow.innerHTML = '<p style="font-size: 12px; color: #444; padding: 20px;">No cards collected yet. Scan a QR code in-store to begin!</p>';
            } else {
                [...collected].reverse().forEach(id => { // Newest first in Dutch-A-Dex row
                    const card = GL_CARDS.find(c => c.id === id);
                    if (card) {
                        topRow.insertAdjacentHTML('beforeend', `
                            <div class="card-wrapper collected" onclick="openModal('${id}')">
                                <button class="share-btn" onclick="event.stopPropagation(); shareIndividualCard('${id}')"><i class="fas fa-share-alt"></i></button>
                                <div class="card-frame"><img src="${card.image}" class="card-img-fix"></div>
                                <div class="card-name">${card.name}</div>
                            </div>`);
                    }
                });
            }

            // 2. Populate Sets (Chronological)
            const setContainer = document.getElementById('sets-container');
            setContainer.innerHTML = '';
            GL_SETS.forEach(set => {
                const count = set.cardIds.filter(id => collected.includes(id)).length;
                const isDone = count === set.cardIds.length;
                
                const html = `
                    <div class="set-section">
                        <div class="set-header">
                            <div>
                                <h3 class="set-name" style="${count === 0 ? 'opacity: 0.3' : ''}">${set.name}</h3>
                                <span class="set-reward-tag">${isDone ? '✨ Set Complete!' : set.reward}</span>
                            </div>
                            <div style="font-size: 11px; font-weight: 800; color: ${count > 0 ? 'var(--gold)' : '#333'}">${count}/${set.cardIds.length}</div>
                        </div>
                        <div class="scroll-row" id="grid-${set.id}"></div>
                    </div>`;
                setContainer.insertAdjacentHTML('beforeend', html);
                
                const grid = document.getElementById(`grid-${set.id}`);
                set.cardIds.forEach(id => {
                    const card = GL_CARDS.find(c => c.id === id) || { name: '???', image: '' };
                    const isOwned = collected.includes(id);
                    grid.insertAdjacentHTML('beforeend', `
                        <div class="card-wrapper ${isOwned ? 'collected' : 'locked'}" onclick="${isOwned ? `openModal('${id}')` : ''}">
                            ${isOwned ? `<button class="share-btn" onclick="event.stopPropagation(); shareIndividualCard('${id}')"><i class="fas fa-share-alt"></i></button>` : ''}
                            <div class="card-frame"><img src="${card.image}" class="card-img-fix"></div>
                            <div class="card-name">${card.name}</div>
                        </div>`);
                });
            });
        }

        // NEW: Function for Individual Card Redemption
        function openModal(id) {
            const card = GL_CARDS.find(c => c.id === id);
            document.getElementById('modal-title').innerText = card.name;
            document.getElementById('modal-perk').innerText = card.reward;
            document.getElementById('modal-rarity').innerText = card.rarity;
            document.getElementById('modal-art').src = card.image;
            document.getElementById('qrcode').innerHTML = '';
            new QRCode(document.getElementById("qrcode"), { text: `DUTCHAMON: ${card.reward} (${card.name})`, width: 160, height: 160 });
            document.getElementById('redemption-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { document.getElementById('redemption-modal').style.display = 'none'; document.body.style.overflow = 'auto'; }

        // NEW: Dynamic Card Sharing with intriguing text + link
        function shareIndividualCard(cardId) {
            const card = GL_CARDS.find(c => c.id === cardId);
            const cardLink = `${window.location.origin}/collect/${cardId}.html`;
            const shareText = `Jamie, I found it! The ${card.name} is mine! The hunt is real... Start your collection before they disappear: ${cardLink}`;
            const shareData = {
                title: 'Dutch-A-Mon Unlocked!',
                text: shareText,
                url: cardLink
            };

            if (navigator.share) {
                navigator.share(shareData)
                    .catch((err) => console.log('Error sharing:', err));
            } else {
                navigator.clipboard.writeText(shareText);
                alert('Dutch-A-Mon text and link copied! Paste it into a text to Jamie.');
            }
        }

        // NEW: Share entire collection
        function shareEntireCollection() {
            if (navigator.share) {
                navigator.share({ title: 'My Dutch-A-Mon Binder', url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('Dutch-A-Mon binder link copied!');
            }
        }

        window.onload = render;
    </script>
</body>
</html>
