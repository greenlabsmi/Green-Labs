<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dutch Collection | Green Labs</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d6a441; --green: #2ef8bb; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Cinzel', serif; letter-spacing: 1px; }

        .binder-container { max-width: 900px; margin: 0 auto; padding: 20px; padding-bottom: 100px; }
        
        .master-progress { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; margin-bottom: 40px; text-align: center; }
        .bar-bg { background: #111; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 10px; }
        .bar-fill { background: var(--gold); height: 100%; transition: width 1s ease; }

        .set-section { margin-bottom: 60px; }
        .set-header { margin-bottom: 20px; border-left: 3px solid var(--gold); padding-left: 15px; display: flex; justify-content: space-between; align-items: flex-end; }
        .set-reward { font-size: 11px; font-weight: 800; color: var(--green); text-transform: uppercase; letter-spacing: 1px; }
        
        /* NEW: Claim Button Styling */
        .claim-btn { 
            background: var(--gold); color: #000; border: none; padding: 5px 12px; 
            border-radius: 5px; font-weight: 800; font-size: 10px; cursor: pointer;
            margin-top: 5px; display: inline-block; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; } 
        .card-wrapper { cursor: pointer; transition: transform 0.2s; }
        .card-wrapper:active { transform: scale(0.96); }

        .card-frame { 
            width: 100%; aspect-ratio: 2/3; background: #111; 
            border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
        }
        
        .card-img-fix { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .card-label { padding: 12px 5px; }
        .card-label h3 { font-size: 16px; margin: 0; color: #fff; }
        .card-hint { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 4px; }
        .locked { filter: grayscale(1); opacity: 0.3; }

        .modal { 
            position: fixed; inset: 0; background: var(--bg); 
            z-index: 2000; display: none; flex-direction: column;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }

        .modal-header { 
            position: sticky; top: 0; background: rgba(5,5,5,0.9); 
            backdrop-filter: blur(10px); padding: 20px; z-index: 10;
            display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .back-btn { 
            background: none; border: 1px solid rgba(255,255,255,0.2); 
            color: #fff; padding: 8px 16px; border-radius: 30px; 
            font-size: 12px; font-weight: 700; cursor: pointer;
        }

        .modal-body { padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; box-sizing: border-box; text-align: center; }
        .modal-hero { width: 100%; max-height: 60vh; object-fit: contain; border-radius: 15px; margin-bottom: 25px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        .reward-pill { background: rgba(46, 248, 187, 0.05); border: 1px solid var(--green); padding: 15px; border-radius: 12px; margin-bottom: 25px; }
        .qr-section { background: #fff; padding: 20px; border-radius: 20px; display: inline-block; margin-bottom: 30px; }
        #qrcode img { margin: 0 auto; }

        @media (min-width: 600px) { .card-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>

    <div class="binder-container">
        <header style="text-align: center; padding: 40px 0;">
            <h1 style="color: var(--gold); margin:0;">The Dutch Collection</h1>
            <p style="font-size: 12px; color: rgba(255,255,255,0.4);">Digital Strain Binder</p>
        </header>

        <div class="master-progress">
            <span id="progress-text" style="font-size: 11px; font-weight: 800; color: var(--gold);">0 / 22 COLLECTED</span>
            <div class="bar-bg"><div id="progress-fill" class="bar-fill" style="width: 0%;"></div></div>
        </div>

        <div id="sets-container"></div>
    </div>

    <div id="redemption-modal" class="modal">
        <div class="modal-header">
            <button class="back-btn" onclick="closeModal()">← Back to Collection</button>
        </div>
        
        <div class="modal-body">
            <img src="" id="modal-art" class="modal-hero">
            <p id="modal-rarity" style="color: var(--gold); font-weight: 800; font-size: 11px; letter-spacing: 2px; margin-bottom: 5px;"></p>
            <h2 id="modal-title" style="font-size: 28px; margin: 0 0 15px 0;"></h2>
            <div class="reward-pill">
                <span style="font-size: 9px; color: rgba(255,255,255,0.5); display: block; margin-bottom: 3px;">COLLECTOR DISCOUNT:</span>
                <p id="modal-perk" style="color: var(--green); font-weight: 800; font-size: 18px; margin: 0;"></p>
            </div>
            <div class="qr-section">
                <div id="qrcode"></div>
                <p style="color: #666; font-size: 9px; font-weight: 800; margin-top: 12px; text-transform: uppercase;">Scan at Register</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const GL_CARDS = [
            { id: 'lemon-wookie', name: 'Lemon Wookie', image: 'assets/img/strains/lemon-wookie-art.jpg', reward: '$1 Off Your 1/8th', rarity: 'AWARD WINNER', hint: 'Find the Trophy Case' },
            { id: 'falcon-9', name: 'Falcon 9', image: 'assets/img/strains/falcon-9-art.jpg', reward: '$1 Off Your 1/8th', rarity: 'PREMIUM HYBRID', hint: 'Look to the Stars' },
            { id: 'solo-walker', name: 'Solo Walker', image: 'assets/img/strains/solo-walker-art.jpg', reward: '$1 Off Your 1/8th', rarity: 'ELITE GENETICS', hint: 'Check the Deli' },
            { id: '13-layer-cake', name: '13 Layer Cake', image: 'assets/img/strains/13-layer-cake-art.jpg', reward: '$1 Off Your 1/8th', rarity: 'SATIVA HYBRID', hint: 'Check the Specials' },
            { id: 'banana-split', name: 'Banana Split', image: 'assets/img/strains/banana-split-art.jpg', reward: '$1 Off Your 1/8th', rarity: 'HYBRID', hint: 'Sweet Terps' },
            { id: 'double-bubble', name: 'Double Bubble', image: 'assets/img/strains/double-bubble-art.jpg', reward: '$1 Off Your 1/8th', rarity: 'HYBRID', hint: 'Pop the Bubble' },
            { id: 'security-guy', name: 'The Bodyguard', image: 'assets/img/hero.jpg', reward: 'Free Sticker Pack', rarity: 'SECRET DROP', hint: 'Reception Desk' },
            { id: 'colossus', name: 'The Colossus', image: 'assets/img/greenlabs-logo.png', reward: '15% Off Total Order', rarity: 'LEGENDARY', hint: 'The 15ft Painting' }
        ];

        const GL_SETS = [
            { id: 'jedi', name: 'Jedi Council', reward: 'Set Reward: 20% Off Set', cardIds: ['lemon-wookie', 'falcon-9', 'solo-walker'] },
            { id: 'bakery', name: 'The Bakery', reward: 'Set Reward: Free 100mg Edible', cardIds: ['13-layer-cake', 'banana-split', 'double-bubble'] },
            { id: 'hidden', name: 'Secret Stash', reward: 'Set Reward: Mystery Merch', cardIds: ['security-guy', 'colossus'] }
        ];

        function getCollected() { return JSON.parse(localStorage.getItem('collectedStrains')) || []; }

        function render() {
            const collected = getCollected();
            const container = document.getElementById('sets-container');
            container.innerHTML = '';
            const totalCollected = collected.length;
            document.getElementById('progress-fill').style.width = (totalCollected / 22 * 100) + '%';
            document.getElementById('progress-text').innerText = `${totalCollected} / 22 COLLECTED`;

            GL_SETS.forEach(set => {
                const count = set.cardIds.filter(id => collected.includes(id)).length;
                const isComplete = count === set.cardIds.length;
                const hasAny = count > 0;
                
                const html = `
                    <div class="set-section">
                        <div class="set-header">
                            <div>
                                <h2 style="margin:0; ${!hasAny ? 'opacity:0.3' : ''}">${set.name}</h2>
                                ${isComplete ? 
                                    `<button class="claim-btn" onclick="openSetModal('${set.id}')">✨ CLAIM MEGA DEAL</button>` : 
                                    `<span class="set-reward">${set.reward}</span>`
                                }
                            </div>
                            <div style="font-size: 10px; color: ${hasAny ? 'var(--gold)' : '#333'}">${count}/${set.cardIds.length}</div>
                        </div>
                        <div class="card-grid" id="grid-${set.id}"></div>
                    </div>`;
                
                container.insertAdjacentHTML('beforeend', html);
                const grid = document.getElementById(`grid-${set.id}`);
                set.cardIds.forEach(id => {
                    const card = GL_CARDS.find(c => c.id === id) || { name: '???', image: '', hint: 'Coming Soon' };
                    const isOwned = collected.includes(id);
                    grid.insertAdjacentHTML('beforeend', `<div class="card-wrapper ${isOwned ? '' : 'locked'}" onclick="${isOwned ? `openModal('${id}')` : ''}">
                            <div class="card-frame"><img src="${card.image}" class="card-img-fix"></div>
                            <div class="card-label"><h3>${card.name}</h3>${!isOwned ? `<div class="card-hint">Hint: ${card.hint}</div>` : ''}</div>
                        </div>`);
                });
            });
        }

        function openModal(id) {
            const card = GL_CARDS.find(c => c.id === id);
            document.getElementById('modal-title').innerText = card.name;
            document.getElementById('modal-perk').innerText = card.reward;
            document.getElementById('modal-rarity').innerText = card.rarity;
            document.getElementById('modal-art').src = card.image;
            document.getElementById('qrcode').innerHTML = '';
            new QRCode(document.getElementById("qrcode"), { text: `DANKAMON_REDEEM: ${card.reward} (${card.name})`, width: 180, height: 180 });
            document.getElementById('redemption-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        // NEW: Function for Set Redemption
        function openSetModal(setId) {
            const set = GL_SETS.find(s => s.id === setId);
            document.getElementById('modal-title').innerText = set.name + " COMPLETE!";
            document.getElementById('modal-perk').innerText = set.reward;
            document.getElementById('modal-rarity').innerText = "SET MEGA-REWARD";
            // Uses the first card image of the set as a placeholder for the hero art
            document.getElementById('modal-art').src = GL_CARDS.find(c => c.id === set.cardIds[0]).image;
            document.getElementById('qrcode').innerHTML = '';
            new QRCode(document.getElementById("qrcode"), { text: `DANKAMON_SET_REDEEM: ${set.reward}`, width: 180, height: 180 });
            document.getElementById('redemption-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('redemption-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onload = render;
    </script>
</body>
</html>
