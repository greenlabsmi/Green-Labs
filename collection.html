<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dutch-A-Mon | Green Labs Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #d6a441; --green: #2ef8bb; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Cinzel', serif; letter-spacing: 1px; margin: 0; }

        .binder-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* HEADER & STATS (Locked to single line) */
        .dex-header-container {
            display: flex; justify-content: space-between; align-items: center; 
            margin: 20px 0 40px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .dex-title h1 { color: var(--gold); font-size: clamp(24px, 6vw, 36px); font-weight: 900; }
        .dex-title p { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px; margin: 5px 0 0 0; }
        
        .dex-counter-pill {
            background: var(--glass); border: 1px solid var(--gold); border-radius: 30px;
            padding: 8px 16px; display: flex; flex-direction: column; align-items: center;
            white-space: nowrap; /* Prevents stacking */
            box-shadow: 0 0 15px rgba(214, 164, 65, 0.15);
        }
        .dex-counter-pill span.num { font-size: 18px; font-weight: 800; color: #fff; }
        .dex-counter-pill span.lbl { font-size: 8px; color: var(--gold); text-transform: uppercase; font-weight: 700; letter-spacing: 1px;}

        /* Scroll Rows */
        .scroll-row { display: flex; overflow-x: auto; gap: 15px; padding: 10px 5px 25px; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .scroll-row::-webkit-scrollbar { display: none; }

        /* Typography Enhancements */
        .section-header { margin-bottom: 15px; display: flex; justify-content: space-between; align-items: baseline; }
        .section-header h2 { font-size: clamp(18px, 5vw, 24px); color: #fff; text-transform: uppercase; border-left: 3px solid var(--gold); padding-left: 10px; }
        .set-fraction { font-size: 20px; font-weight: 900; color: var(--gold); }
        .set-reward { display: block; font-size: 10px; color: var(--green); font-weight: 800; text-transform: uppercase; margin-top: 4px; padding-left: 13px; }

        /* Card Styling (Cleaned up, no home screen share icon) */
        .card-wrapper { flex: 0 0 140px; scroll-snap-align: start; cursor: pointer; position: relative; }
        .card-frame { width: 100%; aspect-ratio: 2/3; background: #111; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        
        /* Subtle Shimmer */
        .collected .card-frame::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-25deg); animation: subtleShimmer 7s infinite;
        }
        @keyframes subtleShimmer { 0% { left: -150%; } 15% { left: 150%; } 100% { left: 150%; } }

        .card-img { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .card-name { font-size: 11px; font-weight: 700; margin-top: 8px; text-align: center; color: rgba(255,255,255,0.8); }
        .locked { filter: grayscale(1); opacity: 0.2; }

        /* --- MODAL (Card Details View) --- */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; overflow-y: auto; }
        .modal-header { position: sticky; top: 0; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); padding: 15px 20px; z-index: 10; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .back-btn { background: none; border: none; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .share-btn { background: none; border: none; color: var(--gold); font-size: 18px; cursor: pointer; }
        
        .modal-body { padding: 20px; max-width: 450px; margin: 0 auto; text-align: center; width: 100%; }
        
        /* Interactive Hero Image Container */
        .hero-container { position: relative; margin-bottom: 15px; cursor: pointer; }
        .modal-hero { width: 100%; max-height: 50vh; object-fit: contain; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hero-hint { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); color: #fff; font-size: 10px; padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); pointer-events: none; }

        /* Slimmer Discount Box */
        .reward-pill { background: rgba(46, 248, 187, 0.05); border: 1px solid rgba(46, 248, 187, 0.3); padding: 10px; border-radius: 8px; margin-bottom: 25px; }
        #modal-perk { color: var(--green); font-weight: 800; font-size: 14px; margin: 0; }

        /* Purposeful QR Area */
        .qr-wrapper { margin-top: 10px; }
        .qr-instruction { color: var(--gold); font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .qr-area { background: #fff; padding: 15px; border-radius: 12px; display: inline-block; margin-bottom: 20px; border: 2px dashed #ccc; }

        /* --- FULL SCREEN SWIPE VIEWER (LIGHTBOX) --- */
        #lightbox-modal { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; flex-direction: column; }
        .lightbox-close { position: absolute; top: 20px; right: 20px; color: #fff; background: rgba(255,255,255,0.1); border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 20px; z-index: 3010; cursor: pointer; backdrop-filter: blur(5px); }
        .lightbox-track { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; height: 100vh; scrollbar-width: none; }
        .lightbox-track::-webkit-scrollbar { display: none; }
        .lightbox-slide { flex: 0 0 100vw; height: 100vh; scroll-snap-align: center; display: flex; align-items: center; justify-content: center; position: relative; padding: 20px; }
        .lightbox-slide img { max-width: 100%; max-height: 85vh; object-fit: contain; border-radius: 15px; }
        .lightbox-name { position: absolute; bottom: 40px; text-align: center; width: 100%; color: #fff; font-family: 'Cinzel', serif; font-size: 24px; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }

        /* Footer */
        .collection-footer { background: #0a0a0a; border-top: 1px solid rgba(255,255,255,0.1); padding: 40px 20px; text-align: center; }
        .btn-shop { background: var(--gold); color: #000; padding: 16px 40px; border-radius: 12px; text-decoration: none; font-weight: 800; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="binder-container">
        <header class="dex-header-container">
            <div class="dex-title">
                <h1>DANK-A-MON</h1>
                <p>The Dutch Touch Collection</p>
            </div>
            <div class="dex-counter-pill">
                <span class="num" id="master-count">0/22</span>
                <span class="lbl">DEX COUNTER</span>
            </div>
        </header>

        <div>
            <div class="section-header"><h2>Your Collection</h2></div>
            <div id="all-collected-row" class="scroll-row"></div>
        </div>

        <div id="sets-container" style="margin-top: 20px;"></div>
    </div>

    <footer class="collection-footer">
        <a href="https://greenlabsmi.com" class="btn-shop">Return to Shop</a>
        <p style="font-size: 10px; color: rgba(255,255,255,0.3);">© 2026 GREEN LABS PROVISIONS</p>
    </footer>

    <div id="viewer-modal" class="modal">
        <div class="modal-header">
            <button class="back-btn" onclick="closeModal()"><i class="fas fa-chevron-left"></i> Back</button>
            <h3 id="header-strain-name" style="font-size: 14px; margin:0; color:var(--gold);"></h3>
            <button class="share-btn" onclick="shareCurrentCard()"><i class="fas fa-share-nodes"></i></button>
        </div>
        <div class="modal-body">
            
            <div class="hero-container" onclick="openLightbox()">
                <img src="" id="modal-art" class="modal-hero">
                <div class="hero-hint"><i class="fas fa-expand"></i> Tap for Full Screen</div>
            </div>

            <p id="modal-rarity" style="color: rgba(255,255,255,0.5); font-size: 11px; margin-bottom: 10px; text-transform: uppercase;"></p>
            
            <div class="reward-pill">
                <p id="modal-perk"></p>
            </div>

            <div class="qr-wrapper">
                <div class="qr-instruction">HAVE BUDTENDER SCAN <i class="fas fa-barcode"></i></div>
                <div class="qr-area"><div id="qrcode"></div></div>
                <p style="font-size: 10px; color: #666;">Active for this month. Manually applied at checkout.</p>
            </div>
        </div>
    </div>

    <div id="lightbox-modal">
        <button class="lightbox-close" onclick="closeLightbox()"><i class="fas fa-times"></i></button>
        <div class="lightbox-track" id="lightbox-track">
            </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const GL_CARDS = [
            { id: 'lemon-wookie', name: 'Lemon Wookie', image: 'assets/img/strains/lemon-wookie-art.jpg', reward: '$1 Off 1/8th', rarity: 'Indica-Hybrid' },
            { id: 'falcon-9', name: 'Falcon 9', image: 'assets/img/strains/falcon-9-art.jpg', reward: '$1 Off 1/8th', rarity: 'Premium Hybrid' },
            { id: 'solo-walker', name: 'Solo Walker', image: 'assets/img/strains/solo-walker-art.jpg', reward: '$1 Off 1/8th', rarity: 'Elite Genetics' },
            { id: '13-layer-cake', name: '13 Layer Cake', image: 'assets/img/strains/13-layer-cake-art.jpg', reward: '$1 Off 1/8th', rarity: 'Sativa Hybrid' },
            { id: 'banana-split', name: 'Banana Split', image: 'assets/img/strains/banana-split-art.jpg', reward: '$1 Off 1/8th', rarity: 'Hybrid' },
            { id: 'double-bubble', name: 'Double Bubble', image: 'assets/img/strains/double-bubble-art.jpg', reward: '$1 Off 1/8th', rarity: 'Hybrid' },
            { id: 'security-guy', name: 'The Bodyguard', image: 'assets/img/hero.jpg', reward: 'Free Sticker', rarity: 'Secret Drop' },
            { id: 'colossus', name: 'The Colossus', image: 'assets/img/greenlabs-logo.png', reward: '15% Off Total', rarity: 'Legendary' }
        ];

        const GL_SETS = [
            { id: 'jedi', name: 'Jedi Council', reward: 'Reward: 20% Off Set', cardIds: ['lemon-wookie', 'falcon-9', 'solo-walker'] },
            { id: 'bakery', name: 'The Bakery', reward: 'Reward: Free Edible', cardIds: ['13-layer-cake', 'banana-split', 'double-bubble'] }
        ];

        let currentActiveId = null;

        function getCollected() { return JSON.parse(localStorage.getItem('collectedStrains')) || []; }

        function render() {
            const collected = getCollected();
            document.getElementById('master-count').innerText = `${collected.length}/22`;

            const topRow = document.getElementById('all-collected-row');
            topRow.innerHTML = '';
            
            [...collected].reverse().forEach(id => {
                const card = GL_CARDS.find(c => c.id === id);
                if (card) {
                    topRow.insertAdjacentHTML('beforeend', `
                        <div class="card-wrapper collected" onclick="openModal('${id}')">
                            <div class="card-frame"><img src="${card.image}" class="card-img"></div>
                            <div class="card-name">${card.name}</div>
                        </div>`);
                }
            });

            const setContainer = document.getElementById('sets-container');
            setContainer.innerHTML = '';
            GL_SETS.forEach(set => {
                const count = set.cardIds.filter(id => collected.includes(id)).length;
                setContainer.insertAdjacentHTML('beforeend', `
                    <div class="set-section">
                        <div class="section-header">
                            <div>
                                <h2>${set.name}</h2>
                                <span class="set-reward">${set.reward}</span>
                            </div>
                            <div class="set-fraction">${count}/${set.cardIds.length}</div>
                        </div>
                        <div class="scroll-row" id="grid-${set.id}"></div>
                    </div>`);
                
                const grid = document.getElementById(`grid-${set.id}`);
                set.cardIds.forEach(id => {
                    const card = GL_CARDS.find(c => c.id === id) || { name: '???', image: '' };
                    const isOwned = collected.includes(id);
                    grid.insertAdjacentHTML('beforeend', `
                        <div class="card-wrapper ${isOwned ? 'collected' : 'locked'}" onclick="${isOwned ? `openModal('${id}')` : ''}">
                            <div class="card-frame"><img src="${card.image}" class="card-img"></div>
                            <div class="card-name">${card.name}</div>
                        </div>`);
                });
            });

            renderLightboxTrack(collected);
        }

        // Builds the Swipeable Gallery behind the scenes
        function renderLightboxTrack(collected) {
            const track = document.getElementById('lightbox-track');
            track.innerHTML = '';
            // Match order of top row (newest first)
            [...collected].reverse().forEach(id => {
                const card = GL_CARDS.find(c => c.id === id);
                if(card) {
                    track.insertAdjacentHTML('beforeend', `
                        <div class="lightbox-slide" id="slide-${id}">
                            <img src="${card.image}">
                            <div class="lightbox-name">${card.name}</div>
                        </div>
                    `);
                }
            });
        }

        function openModal(id) {
            currentActiveId = id;
            const card = GL_CARDS.find(c => c.id === id);
            
            document.getElementById('header-strain-name').innerText = card.name.toUpperCase();
            document.getElementById('modal-art').src = card.image;
            document.getElementById('modal-rarity').innerText = card.rarity;
            document.getElementById('modal-perk').innerText = card.reward;
            
            document.getElementById('qrcode').innerHTML = '';
            new QRCode(document.getElementById("qrcode"), { text: `DANKAMON: ${id}`, width: 140, height: 140, colorDark: "#000", colorLight: "#fff" });
            
            document.getElementById('viewer-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('viewer-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function openLightbox() {
            document.getElementById('lightbox-modal').style.display = 'flex';
            // Snap straight to the card they tapped
            document.getElementById(`slide-${currentActiveId}`).scrollIntoView({ behavior: 'instant', inline: 'center' });
        }

        function closeLightbox() {
            document.getElementById('lightbox-modal').style.display = 'none';
        }

        function shareCurrentCard() {
            const card = GL_CARDS.find(c => c.id === currentActiveId);
            const url = `https://greenlabsmi.com/collect/${currentActiveId}.html`;
            if (navigator.share) {
                navigator.share({ title: 'Dank-A-Mon Unlocked!', text: `I found the ${card.name}! Start your collection before they disappear:`, url: url });
            }
        }

        window.onload = render;
    </script>
</body>
</html>
